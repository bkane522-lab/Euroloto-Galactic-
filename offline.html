<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#061950" />
  <title>Euroloto Galactic - Hors ligne</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,216,77,.24), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(0,107,255,.24), transparent 34%),
        linear-gradient(180deg, #06276b, #020817);
    }

    .card {
      width: min(520px, 100%);
      border-radius: 30px;
      padding: 28px;
      text-align: center;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 24px 80px rgba(0,0,0,.42);
      backdrop-filter: blur(16px);
    }

    .logo {
      font-size: 64px;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 22px rgba(255,216,77,.55));
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3rem);
      color: #ffd84d;
      line-height: 1;
    }

    p {
      color: rgba(255,255,255,.74);
      line-height: 1.55;
      margin: 16px 0 0;
    }

    button {
      margin-top: 22px;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      color: #071b4d;
      background: linear-gradient(135deg, #ffd84d, #fff0a8);
      font-weight: 950;
      cursor: pointer;
    }

    small {
      display: block;
      margin-top: 18px;
      color: rgba(255,255,255,.44);
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo">🪐</div>
    <h1>Mode hors ligne</h1>
    <p>
      Euroloto Galactic est installée, mais la connexion est indisponible.
      Reviens à l’accueil pour utiliser les fonctions mises en cache.
    </p>
    <button onclick="window.location.href='/'">Retour à l’accueil</button>
    <small>Application indépendante, non affiliée à la FDJ. Aucun gain garanti.</small>
  </main>
</body>
</html>
